<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>

    <link rel="stylesheet" href="adrin_shrestha_2595691.css">
</head>
<body>
    <div class="searchPart" id="searchPart">
        <input placeholder="Enter city name" class="searchBox" id="searchBox">
        <button class="button" id="button">Search</button>
    </div>
    <div class="main" id="main">
        <div class="weatherDetails">
            <div class="weatherrow">
                <div class="content">
                    <h1 class="city" id="city">City Name</h1>
                    <h3 class="country" id="country">Country</h3>
                    <div class="timedate" id="timedate"></div>
                    <div class="temp" id="temp">Temperature</div>
                    <div class="condition" id="condition">Condition</div>
                    <p class="description" id="description"></p>
                </div>
                <div class="iconDiv" id="iconDiv">
                    <img src="" alt="Weather Icon" class="icon" id="icon">
                </div>
            </div>
            <div class="feelsLike" id="feelsLike">Feels like</div>
            <div class="humidity" id="humidity">Humidity</div>
            <div class="pressure" id="pressure">Pressure</div>
            <div class="wind" id="wind">Wind speed</div>
            <div class="clouds" id="clouds">Cloudiness</div>
        </div>
    </div>

    <script src="adrin_shrestha_2595691.js"></script>
</body>
</html>
